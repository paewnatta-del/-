<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>แบบประเมินเส้นฟอกไตด้วยตนเอง</title>
    <!-- นำเข้าฟอนต์ Prompt เพื่อความทันสมัย -->
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4F46E5; /* สีน้ำเงินอมม่วงดูตื่นเต้นและทันสมัย */
            --primary-hover: #4338CA;
            --secondary: #10B981; /* สีเขียวสดใส */
            --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --card-bg: rgba(255, 255, 255, 0.95);
            --text-dark: #1F2937;
            --text-muted: #6B7280;
            --border: #D1D5DB;
        }

        body {
            font-family: 'Prompt', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-dark);
            margin: 0;
            padding: 20px;
            font-size: 16px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 1100px;
            background: var(--card-bg);
            padding: 30px 40px;
            border-radius: 20px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            backdrop-filter: blur(10px);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            color: var(--primary);
            font-size: 32px;
            font-weight: 600;
            margin: 0 0 10px 0;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        .header p {
            color: var(--text-muted);
            font-size: 16px;
            margin: 0;
        }

        /* แบ่ง Layout เป็น 2 คอลัมน์ (ซ้าย-ขวา) */
        .layout-grid {
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 40px;
        }

        h2 {
            font-size: 20px;
            color: var(--primary);
            border-bottom: 2px solid var(--primary);
            padding-bottom: 8px;
            margin-top: 0;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--text-dark);
        }

        input[type="text"],
        input[type="number"],
        select {
            width: 100%;
            padding: 12px 15px;
            font-size: 16px;
            font-family: 'Prompt', sans-serif;
            border: 1px solid var(--border);
            border-radius: 10px;
            box-sizing: border-box;
            background-color: #F9FAFB;
            transition: all 0.3s ease;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.2);
            background-color: #FFF;
        }

        /* การประเมินแบ่งเป็น Grid 2x2 */
        .assessment-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        .assessment-card {
            background: #F3F4F6;
            border-radius: 12px;
            padding: 15px;
            border: 1px solid #E5E7EB;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .assessment-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 12px -2px rgba(0, 0, 0, 0.1);
            border-color: #C7D2FE;
        }

        .image-placeholder {
            width: 100%;
            height: 110px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 12px;
        }

        .radio-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .radio-label {
            display: flex;
            align-items: center;
            padding: 10px;
            background-color: #FFF;
            border: 1px solid #D1D5DB;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 15px;
            margin: 0;
        }

        .radio-label:hover {
            border-color: var(--primary);
            background-color: #EEF2FF;
        }

        .radio-label input[type="radio"] {
            margin-right: 10px;
            transform: scale(1.2);
            accent-color: var(--primary);
        }

        .btn-submit {
            grid-column: 1 / -1;
            width: 100%;
            padding: 16px;
            font-size: 20px;
            font-weight: 600;
            color: #FFFFFF;
            background: linear-gradient(to right, #4F46E5, #3B82F6);
            border: none;
            border-radius: 12px;
            cursor: pointer;
            margin-top: 30px;
            transition: all 0.3s;
            font-family: 'Prompt', sans-serif;
            box-shadow: 0 4px 6px rgba(59, 130, 246, 0.3);
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 15px rgba(59, 130, 246, 0.4);
            background: linear-gradient(to right, #4338CA, #2563EB);
        }

        #alertBox {
            display: none;
            padding: 20px;
            margin-top: 25px;
            border-radius: 12px;
            text-align: center;
            font-weight: 500;
            font-size: 18px;
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .alert-red { background-color: #FEE2E2; color: #991B1B; border: 2px solid #EF4444; }
        .alert-yellow { background-color: #FEF3C7; color: #92400E; border: 2px solid #F59E0B; }
        .alert-green { background-color: #D1FAE5; color: #065F46; border: 2px solid #10B981; }

        /* Responsive Design สำหรับมือถือ */
        @media (max-width: 900px) {
            .layout-grid { grid-template-columns: 1fr; gap: 20px; }
            .assessment-grid { grid-template-columns: 1fr; }
            .container { padding: 20px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>แบบประเมินเส้นฟอกไตด้วยตนเอง</h1>
        <p>เพื่อสุขภาพที่ดีของท่าน กรุณาประเมินอาการตามความเป็นจริง</p>
    </div>

    <form id="assessmentForm">
        <div class="layout-grid">
            
            <!-- ส่วนที่ 1: ซ้าย (ข้อมูลทั่วไป) -->
            <div class="left-panel">
                <h2>📋 ข้อมูลทั่วไป</h2>
                
                <div class="form-group">
                    <label for="gender">เพศ</label>
                    <select id="gender" required>
                        <option value="">เลือกเพศ...</option>
                        <option value="ชาย">ชาย</option>
                        <option value="หญิง">หญิง</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="age">อายุ (ปี)</label>
                    <input type="number" id="age" min="1" max="120" required placeholder="ระบุอายุ">
                </div>

                <div class="form-group">
                    <label for="location">ตำแหน่งเส้นฟอกไต</label>
                    <input type="text" id="location" placeholder="เช่น แขนซ้ายท่อนล่าง" required>
                </div>

                <div class="form-group">
                    <label for="doctor">แพทย์ผู้ดูแล</label>
                    <select id="doctor" required>
                        <option value="">เลือกแพทย์...</option>
                        <option value="พญ.ณัฏฐวดี">พญ.ณัฏฐวดี</option>
                        <option value="แพทย์อื่นๆ">แพทย์อื่นๆ</option>
                    </select>
                </div>

                <div style="margin-top: 30px;">
                    <h2>🩺 ค่าจากการฟอกไต</h2>
                    <div class="form-group">
                        <label for="bfr">BFR (ml/min) <span style="font-weight:normal; font-size:13px; color:#6B7280;">(เว้นว่างได้)</span></label>
                        <input type="number" id="bfr" placeholder="ระบุตัวเลข (ถ้ามี)">
                    </div>

                    <div class="form-group">
                        <label for="vp">VP (mmHg) <span style="font-weight:normal; font-size:13px; color:#6B7280;">(เว้นว่างได้)</span></label>
                        <input type="number" id="vp" placeholder="ระบุตัวเลข (ถ้ามี)">
                    </div>
                </div>
            </div>

            <!-- ส่วนที่ 2: ขวา (การประเมินอาการ) -->
            <div class="right-panel">
                <h2>🔍 การประเมินอาการประจำวัน</h2>
                
                <div class="assessment-grid">
                    
                    <div class="assessment-card">
                        <label>1) การคลำเสียงฟู่ (Thrill)</label>
                        <img src="./images/1_thrill.jpg" alt="การคลำเสียงฟู่" class="image-placeholder" onerror="this.src='https://via.placeholder.com/400x200?text=ใส่รูป+1_thrill.jpg+ในโฟลเดอร์+images'">
                        <div class="radio-group">
                            <label class="radio-label"><input type="radio" name="thrill" value="คลำเจอชัดเจน" required> คลำเจอชัดเจน (ปกติ)</label>
                            <label class="radio-label"><input type="radio" name="thrill" value="เบาลง"> เบาลง</label>
                            <label class="radio-label"><input type="radio" name="thrill" value="คลำไม่ได้เลย"> คลำไม่ได้เลย</label>
                        </div>
                    </div>

                    <div class="assessment-card">
                        <label>2) อาการติดเชื้อ</label>
                        <img src="./images/2_infection.jpg" alt="อาการติดเชื้อ" class="image-placeholder" onerror="this.src='https://via.placeholder.com/400x200?text=ใส่รูป+2_infection.jpg+ในโฟลเดอร์+images'">
                        <div class="radio-group">
                            <label class="radio-label"><input type="radio" name="infection" value="ไม่มีอาการ" required> ไม่มีอาการ (ปกติ)</label>
                            <label class="radio-label"><input type="radio" name="infection" value="ปวดบวมแดงมีไข้"> ปวดบวมแดงมีไข้</label>
                        </div>
                    </div>

                    <div class="assessment-card">
                        <label>3) เลือดออกหลังดึงเข็ม</label>
                        <img src="./images/3_bleeding.jpg" alt="การเลือดออกหลังดึงเข็ม" class="image-placeholder" onerror="this.src='https://via.placeholder.com/400x200?text=ใส่รูป+3_bleeding.jpg+ในโฟลเดอร์+images'">
                        <div class="radio-group">
                            <label class="radio-label"><input type="radio" name="bleeding" value="ปกติ" required> ปกติ</label>
                            <label class="radio-label"><input type="radio" name="bleeding" value="กดหยุดยากใช้เวลานาน"> หยุดยากใช้เวลานาน</label>
                            <label class="radio-label"><input type="radio" name="bleeding" value="เลือดออกมากทะลักพลาสเตอร์"> ทะลักพลาสเตอร์</label>
                        </div>
                    </div>

                    <div class="assessment-card">
                        <label>4) การเจาะเส้น (Cannulation)</label>
                        <img src="./images/4_cannulation.jpg" alt="การเจาะเส้น" class="image-placeholder" onerror="this.src='https://via.placeholder.com/400x200?text=ใส่รูป+4_cannulation.jpg+ในโฟลเดอร์+images'">
                        <div class="radio-group">
                            <label class="radio-label"><input type="radio" name="cannulation" value="เจาะได้ปกติ" required> เจาะได้ปกติ</label>
                            <label class="radio-label"><input type="radio" name="cannulation" value="เจาะยาก แทงเข็มมากกว่า 3 ครั้ง"> แทงเข็มมากกว่า 3 ครั้ง</label>
                            <label class="radio-label"><input type="radio" name="cannulation" value="ไม่สามารถฟอกได้เลย"> ฟอกไม่ได้เลย</label>
                        </div>
                    </div>

                </div>
            </div>

            <!-- ปุ่ม Submit ครอบคลุมทั้งสองคอลัมน์ด้านล่างสุด -->
            <button type="submit" class="btn-submit">🚀 บันทึกและส่งผลการประเมิน</button>
        </div>
    </form>

    <div id="alertBox"></div>
</div>

<script>
    const GAS_WEBHOOK_URL = "YOUR_GOOGLE_APPS_SCRIPT_WEBHOOK_URL"; // นำ URL จาก GAS มาใส่ที่นี่

    document.getElementById('assessmentForm').addEventListener('submit', function(e) {
        e.preventDefault();

        // รวบรวมข้อมูลผู้ป่วย
        const patientData = {
            gender: document.getElementById('gender').value,
            age: document.getElementById('age').value,
            location: document.getElementById('location').value,
            doctor: document.getElementById('doctor').value
        };

        // รวบรวมข้อมูลอาการ
        const thrill = document.querySelector('input[name="thrill"]:checked').value;
        const infection = document.querySelector('input[name="infection"]:checked').value;
        const bleeding = document.querySelector('input[name="bleeding"]:checked').value;
        const cannulation = document.querySelector('input[name="cannulation"]:checked').value;
        
        const bfrValue = document.getElementById('bfr').value;
        const vpValue = document.getElementById('vp').value;
        
        const bfr = bfrValue ? parseInt(bfrValue) : null;
        const vp = vpValue ? parseInt(vpValue) : null;

        // การประเมิน (Triage)
        let triageLevel = "Green"; 
        let abnormalSymptoms = [];

        // เงื่อนไขสีแดง
        if (thrill === "คลำไม่ได้เลย") { abnormalSymptoms.push("Thrill: คลำไม่ได้เลย"); triageLevel = "Red"; }
        if (infection === "ปวดบวมแดงมีไข้") { abnormalSymptoms.push("อาการติดเชื้อ: ปวดบวมแดงมีไข้"); triageLevel = "Red"; }
        if (bleeding === "เลือดออกมากทะลักพลาสเตอร์") { abnormalSymptoms.push("การเลือดออก: เลือดออกมากทะลักพลาสเตอร์"); triageLevel = "Red"; }
        if (cannulation === "ไม่สามารถฟอกได้เลย") { abnormalSymptoms.push("การเจาะเส้น: ไม่สามารถฟอกได้เลย"); triageLevel = "Red"; }

        // เงื่อนไขสีเหลือง
        let isYellowConditionFound = false;
        if (thrill === "เบาลง") { abnormalSymptoms.push("Thrill: เบาลง"); isYellowConditionFound = true; }
        if (bleeding === "กดหยุดยากใช้เวลานาน") { abnormalSymptoms.push("การเลือดออก: กดหยุดยากใช้เวลานาน"); isYellowConditionFound = true; }
        if (cannulation === "เจาะยาก แทงเข็มมากกว่า 3 ครั้ง") { abnormalSymptoms.push("การเจาะเส้น: เจาะยาก แทงเข็มมากกว่า 3 ครั้ง"); isYellowConditionFound = true; }
        if (bfr !== null && bfr < 250) { abnormalSymptoms.push(`BFR ต่ำ: ${bfr} ml/min (< 250)`); isYellowConditionFound = true; }
        if (vp !== null && vp > 200) { abnormalSymptoms.push(`VP สูง: ${vp} mmHg (> 200)`); isYellowConditionFound = true; }

        if (triageLevel !== "Red" && isYellowConditionFound) {
            triageLevel = "Yellow";
        }

        // จัดการ UI
        const alertBox = document.getElementById('alertBox');
        alertBox.style.display = 'block';
        alertBox.className = ''; 

        if (triageLevel === "Green") {
            alertBox.classList.add('alert-green');
            alertBox.innerHTML = "✨ <b>ปกติสมบูรณ์!</b><br>เส้นฟอกไตของคุณอยู่ในเกณฑ์ดีเยี่ยม ขอให้รักษาสุขภาพต่อไปนะคะ";
        } else {
            const payload = {
                patient: patientData,
                triage: triageLevel,
                symptoms: abnormalSymptoms
            };

            if (triageLevel === "Red") {
                alertBox.classList.add('alert-red');
                alertBox.innerHTML = "🚨 <b>พบอาการผิดปกติฉุกเฉิน (สีแดง)</b><br>ระบบได้ส่งข้อมูลแจ้งไปยังแพทย์ผู้ดูแล @paewnatta ทันที กรุณารอรับการติดต่อกลับค่ะ";
            } else if (triageLevel === "Yellow") {
                alertBox.classList.add('alert-yellow');
                alertBox.innerHTML = "⚠️ <b>พบอาการที่ต้องเฝ้าระวัง (สีเหลือง)</b><br>ระบบได้ส่งข้อมูลเบื้องต้นให้แพทย์ทราบแล้วค่ะ";
            }

            // ยิง API ไปที่ GAS
            fetch(GAS_WEBHOOK_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'text/plain' },
                body: JSON.stringify(payload)
            }).then(() => {
                console.log("ส่งข้อมูลสำเร็จ");
            }).catch((error) => {
                console.error("Error:", error);
                alert("เกิดข้อผิดพลาดในการส่งข้อมูล");
            });
        }
        
        // เลื่อนให้เห็นข้อความ
        alertBox.scrollIntoView({ behavior: 'smooth', block: 'center' });
    });
</script>

</body>
</html>
